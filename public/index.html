<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Squad Quiz</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <link rel="stylesheet" href="/client.css">
</head>
<body>
    <div class="container">
        <div class="header-glass">
            <!-- Ajout du logo personnalisé à gauche -->
            <img src="/images/logosquad.png" alt="Logo Communauté" class="logo" />
            <h1 class="header-title">
                Science Squad Quiz
                <span id="status" class="status-glow"><span class="section-icon">🟢</span> Connecté</span>
            </h1>
        </div>
        <div class="main-client-grid">
            <!-- Écran d'accueil -->
            <section id="welcome-screen" class="card screen">
                <h2><span class="section-icon">🚀</span> Rejoindre le Quiz</h2>
                <div class="form-group">
                    <label for="player-name">Votre pseudo :</label>
                    <input type="text" id="player-name" placeholder="Entrez votre pseudo">
                </div>
                <div class="form-group">
                    <label>Choisissez votre avatar :</label>
                    <div class="avatar-grid">
                        <div class="avatar" data-avatar="😊">😊</div>
                        <div class="avatar" data-avatar="🤓">🤓</div>
                        <div class="avatar" data-avatar="🚀">🚀</div>
                        <div class="avatar" data-avatar="🔬">🔬</div>
                        <div class="avatar" data-avatar="⚡">⚡</div>
                        <div class="avatar" data-avatar="🎯">🎯</div>
                        <div class="avatar" data-avatar="🏆">🏆</div>
                        <div class="avatar" data-avatar="🎮">🎮</div>
                    </div>
                </div>
                <button id="join-game-btn" class="btn btn-primary">Rejoindre le Quiz</button>
            </section>

            <!-- Lobby joueurs -->
            <section id="lobby-screen" class="card screen hidden">
                <h2><span class="section-icon">🎮</span> Lobby du Quiz</h2>
                <p>En attente du démarrage de la partie...</p>
                <div class="player-info">
                    <h3>Votre profil :</h3>
                    <div id="current-player-info"></div>
                </div>
                <div class="players-list">
                    <h3>Joueurs connectés (<span id="player-count">0</span>)</h3>
                    <div id="players-container"></div>
                </div>
            </section>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
